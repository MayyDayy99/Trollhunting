<!-- @dsCard group="Effects" viewport="700x230" name="Death Animations" subtitle="Live: base crumble + elemental override (loops)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); color: var(--ink); padding: 14px 16px;
    background: radial-gradient(ellipse at 50% 45%, #16223c, #0a1018 72%); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .stage { width: 100%; height: 150px; border-radius: 11px; overflow: hidden; background: radial-gradient(ellipse at 50% 62%, rgba(22,34,60,.55), rgba(8,14,28,.5)); border: 1px solid var(--line); }
  canvas { display: block; width: 100%; height: 100%; }
  .lab { font-family: var(--font-display); font-weight: 700; font-size: 11px; letter-spacing: .04em; }
  .sub { font-size: 8.5px; color: var(--ink-muted); margin-top: -4px; text-align: center; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="stage"><canvas data-el="base"></canvas></div><span class="lab" style="color:#cfe0ff">BASE</span><span class="sub">crumble</span></div>
    <div class="cell"><div class="stage"><canvas data-el="fire"></canvas></div><span class="lab" style="color:#ff7a3d">TŰZ</span><span class="sub">elhamvad</span></div>
    <div class="cell"><div class="stage"><canvas data-el="ice"></canvas></div><span class="lab" style="color:#7fd0ff">JÉG</span><span class="sub">szétfagy</span></div>
    <div class="cell"><div class="stage"><canvas data-el="poison"></canvas></div><span class="lab" style="color:#9fdc4a">MÉREG</span><span class="sub">elolvad</span></div>
    <div class="cell"><div class="stage"><canvas data-el="lightning"></canvas></div><span class="lab" style="color:#b48cff">VILLÁM</span><span class="sub">elszenesedik</span></div>
  </div>
  <script src="./fx/element-fx.js"></script>
  <script>
    document.querySelectorAll('canvas[data-el]').forEach((cv) => ElementFX.create(cv, { element: cv.dataset.el, mode: 'death' }));
  </script>
</body>
</html>
