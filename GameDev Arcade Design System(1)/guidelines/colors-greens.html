<!-- @dsCard group="Colors" viewport="700x150" name="Nature Greens" subtitle="Mohás Berci's forest-night world" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--bg-mid); color: var(--ink); padding: 18px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; height: 88px; border-radius: var(--radius-md); display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; color: #0b1810; font-weight: 700; }
  .nm { font-size: 11px; }
  .hx { font-family: var(--font-mono); font-size: 10px; font-weight: 500; opacity: .7; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#6fa07a"><span class="nm">moss</span><span class="hx">#6fa07a</span></div>
    <div class="sw" style="background:#41704e;color:#dfeede"><span class="nm">moss-deep</span><span class="hx">#41704e</span></div>
    <div class="sw" style="background:#4f9d5c"><span class="nm">grass</span><span class="hx">#4f9d5c</span></div>
    <div class="sw" style="background:#9fb59f"><span class="nm">lichen</span><span class="hx">#9fb59f</span></div>
    <div class="sw" style="background:#9fe0c8"><span class="nm">mint</span><span class="hx">#9fe0c8</span></div>
  </div>
</body>
</html>
