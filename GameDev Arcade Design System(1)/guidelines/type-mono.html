<!-- @dsCard group="Type" viewport="700x160" name="Mono + Eyebrow" subtitle="Debug/numeric mono & wide-tracked eyebrows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--bg-deep); color: var(--ink); padding: 20px; display: flex; gap: 28px; align-items: center; }
  .col { flex: 1; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); margin: 0 0 12px; }
  .dbg { font-family: var(--font-mono); font-size: 13px; color: var(--mint); background: rgba(8,14,28,.82); border: 1px solid rgba(120,200,170,.35); border-radius: var(--radius-sm); padding: 8px 12px; line-height: 1.5; white-space: pre; }
  .eye { font-size: 12px; letter-spacing: .42em; text-transform: uppercase; color: var(--ink-faint); font-weight: 700; }
  .eye2 { font-size: 12px; letter-spacing: .42em; text-transform: uppercase; color: var(--ember); font-weight: 700; margin-top: 14px; }
</style>
</head>
<body>
  <div class="col">
    <p class="meta">--font-mono · 'JetBrains Mono'</p>
    <div class="dbg">wave: 3   fps: 60
trolls: 7   score: 1240
arrow.dmg: 48  el: fire</div>
  </div>
  <div class="col">
    <p class="meta">eyebrow · track .42em</p>
    <div class="eye">Motion Arcade</div>
    <div class="eye2">Mohás világ · íjász túlélő</div>
  </div>
</body>
</html>
