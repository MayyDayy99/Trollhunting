<!-- @dsCard group="Type" viewport="700x230" name="Display — Chakra Petch" subtitle="Angular HUD display; titles, wave, toast" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-display); background: var(--bg-deep); color: var(--ink); padding: 20px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); margin: 0 0 14px; }
  .big { font-weight: 700; letter-spacing: var(--track-display); line-height: 1; background: var(--grad-title); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 10px; font-size: 64px; }
  .timer { font-weight: 700; font-size: 48px; color: #fff; }
  .row { display: flex; align-items: baseline; gap: 24px; margin-top: 8px; }
  .w { font-weight: 700; font-size: 26px; }
  .w span { color: var(--ink-faint); font-size: 13px; font-family: var(--font-mono); font-weight: 400; }
</style>
</head>
<body>
  <p class="meta">--font-display · 'Chakra Petch' · 400 / 500 / 600 / 700</p>
  <div class="big">MOHÁS ROHAM</div>
  <div class="row">
    <span class="timer">1:32</span>
    <span class="w" style="font-weight:400">Aa <span>400</span></span>
    <span class="w" style="font-weight:500">Aa <span>500</span></span>
    <span class="w" style="font-weight:600">Aa <span>600</span></span>
    <span class="w" style="font-weight:700">Aa <span>700</span></span>
  </div>
</body>
</html>
