<!-- @dsCard group="Elements" viewport="700x300" name="Arrows & Trails" subtitle="Live: each element's projectile, trail & impact" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); color: var(--ink); padding: 14px 16px;
    background: radial-gradient(ellipse at 50% 40%, #16223c, #0a1018 70%); }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .lab { width: 86px; font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: .05em; flex-shrink: 0; }
  .stage { flex: 1; height: 44px; border-radius: 8px; overflow: hidden; background: rgba(8,14,28,.55); border: 1px solid var(--line); }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
  <div class="row"><div class="lab" style="color:#cfe0ff">BASE</div><div class="stage"><canvas data-el="base"></canvas></div></div>
  <div class="row"><div class="lab" style="color:#ff7a3d">TŰZ</div><div class="stage"><canvas data-el="fire"></canvas></div></div>
  <div class="row"><div class="lab" style="color:#7fd0ff">JÉG</div><div class="stage"><canvas data-el="ice"></canvas></div></div>
  <div class="row"><div class="lab" style="color:#9fdc4a">MÉREG</div><div class="stage"><canvas data-el="poison"></canvas></div></div>
  <div class="row"><div class="lab" style="color:#b48cff">VILLÁM</div><div class="stage"><canvas data-el="lightning"></canvas></div></div>
  <script src="./fx/element-fx.js"></script>
  <script>
    document.querySelectorAll('canvas[data-el]').forEach((cv) => {
      ElementFX.create(cv, { element: cv.dataset.el, mode: 'arrow' });
    });
  </script>
</body>
</html>
