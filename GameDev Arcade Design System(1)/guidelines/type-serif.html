<!-- @dsCard group="Type" viewport="700x180" name="Serif — Gelasio" subtitle="Cozy-game titles (Georgia-metric); italic accents" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-serif); color: var(--parchment); padding: 22px; background: var(--bg-vignette), var(--bg-mid); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); margin: 0 0 12px; }
  .title { font-size: 34px; font-weight: 400; text-shadow: 0 2px 14px rgba(0,0,0,.6); margin: 0 0 6px; }
  .title em { font-style: italic; color: var(--gold); }
  .sub { font-size: 16px; color: var(--ink-sub); font-family: var(--font-body); font-weight: 500; }
</style>
</head>
<body>
  <p class="meta">--font-serif · 'Gelasio' (Georgia substitute) · 400 / italic / 500</p>
  <div class="title"><em>The old troll's</em> adventure</div>
  <p class="sub">Reserved for the warm, storybook-flavored games — never the arcade HUD.</p>
</body>
</html>
