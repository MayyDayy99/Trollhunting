<!-- @dsCard group="Colors" viewport="700x180" name="World — Forest Night" subtitle="Near-black navy the glade sits in" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--bg-game); color: var(--ink); padding: 18px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; height: 90px; border-radius: var(--radius-lg); border: 1px solid var(--line); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .nm { font-size: 12px; font-weight: 600; }
  .hx { font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted); }
  .arena { margin-top: 12px; height: 56px; border-radius: var(--radius-lg); background: var(--bg-arena); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; font-size: 11px; letter-spacing: .2em; color: var(--ink-faint); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#0a1018"><span class="nm">bg-game</span><span class="hx">#0a1018</span></div>
    <div class="sw" style="background:#1a2c52"><span class="nm">bg-top</span><span class="hx">#1a2c52</span></div>
    <div class="sw" style="background:#141f36"><span class="nm">bg-mid</span><span class="hx">#141f36</span></div>
    <div class="sw" style="background:#0a1120"><span class="nm">bg-deep</span><span class="hx">#0a1120</span></div>
    <div class="sw" style="background:#060a16"><span class="nm">bg-abyss</span><span class="hx">#060a16</span></div>
  </div>
  <div class="arena">--bg-arena · radial glade gradient</div>
</body>
</html>
