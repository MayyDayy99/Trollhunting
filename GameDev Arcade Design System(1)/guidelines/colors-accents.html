<!-- @dsCard group="Colors" viewport="700x200" name="Accents — Rune · Eye · Torch" subtitle="Cyan UI/rune, orange troll-eye/HP, amber torch" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--bg-game); color: var(--ink); padding: 18px; }
  .lab { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-faint); font-weight: 700; margin: 0 0 7px; }
  .row { display: flex; gap: 10px; margin-bottom: 12px; }
  .sw { flex: 1; height: 52px; border-radius: var(--radius-md); display: flex; flex-direction: column; justify-content: flex-end; padding: 7px; color: #08111f; font-weight: 700; }
  .sw .hx { font-family: var(--font-mono); font-size: 9px; font-weight: 500; opacity: .8; }
  .nm { font-size: 10px; }
</style>
</head>
<body>
  <p class="lab">Cyan — rune / beacon / UI accent</p>
  <div class="row">
    <div class="sw" style="background:#16414f;color:#cfeefa"><span class="nm">rune-deep</span><span class="hx">#16414f</span></div>
    <div class="sw" style="background:#36c5ff"><span class="nm">rune</span><span class="hx">#36c5ff</span></div>
    <div class="sw" style="background:#5fe0ff"><span class="nm">cyan-soft</span><span class="hx">#5fe0ff</span></div>
    <div class="sw" style="background:#7fe2ff"><span class="nm">cyan</span><span class="hx">#7fe2ff</span></div>
  </div>
  <p class="lab">Orange/red — troll-eye · hurt · HP</p>
  <div class="row">
    <div class="sw" style="background:#c9521f;color:#fff"><span class="nm">rust</span><span class="hx">#c9521f</span></div>
    <div class="sw" style="background:#ff5a2a;color:#fff"><span class="nm">troll-eye</span><span class="hx">#ff5a2a</span></div>
    <div class="sw" style="background:#ff7a3d"><span class="nm">eye-glow</span><span class="hx">#ff7a3d</span></div>
    <div class="sw" style="background:#ffd27a"><span class="nm">gold</span><span class="hx">#ffd27a</span></div>
    <div class="sw" style="background:#ffe7b8"><span class="nm">cream</span><span class="hx">#ffe7b8</span></div>
  </div>
</body>
</html>
