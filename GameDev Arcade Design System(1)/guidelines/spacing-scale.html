<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing Scale" subtitle="4 → 48px rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--bg-mid); color: var(--ink); padding: 20px; }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .bar { background: var(--p1); border-radius: 3px; width: 22px; }
  .v { font-family: var(--font-mono); font-size: 10px; color: var(--ink-muted); }
  .n { font-size: 10px; color: var(--ink-faint); font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><span class="v">4</span><span class="n">space-1</span></div>
    <div class="item"><div class="bar" style="height:8px"></div><span class="v">8</span><span class="n">space-3</span></div>
    <div class="item"><div class="bar" style="height:12px"></div><span class="v">12</span><span class="n">space-4</span></div>
    <div class="item"><div class="bar" style="height:14px"></div><span class="v">14</span><span class="n">space-5</span></div>
    <div class="item"><div class="bar" style="height:18px"></div><span class="v">18</span><span class="n">space-6</span></div>
    <div class="item"><div class="bar" style="height:22px"></div><span class="v">22</span><span class="n">space-7</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><span class="v">32</span><span class="n">space-8</span></div>
    <div class="item"><div class="bar" style="height:38px"></div><span class="v">38</span><span class="n">space-9</span></div>
    <div class="item"><div class="bar" style="height:48px"></div><span class="v">48</span><span class="n">space-10</span></div>
  </div>
</body>
</html>
