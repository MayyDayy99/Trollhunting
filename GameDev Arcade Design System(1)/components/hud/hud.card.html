<!-- @dsCard group="Components" viewport="700x420" name="HUD — Bow-game primitives" subtitle="Crosshair · ChargeMeter · WaveBanner · ScorePill · ElementSelector · HealthBar · PlayerCard · StatusPip" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); color: var(--ink); padding: 0;
    background: radial-gradient(ellipse at 50% 40%, #16223c, #0a1018 72%); }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--ink-faint); letter-spacing: .1em; text-transform: uppercase; margin: 0 0 8px; }
  .wrap { padding: 18px; }
  .scene { position: relative; height: 200px; border-radius: 14px; overflow: hidden; border: 1px solid var(--line);
    background: radial-gradient(ellipse at 50% 60%, rgba(26,40,70,.5), rgba(8,14,28,.5)); margin-bottom: 18px; }
  .row { display: flex; gap: 14px; align-items: flex-start; flex-wrap: wrap; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { WaveBanner, ScorePill, HealthBar, ChargeMeter, Crosshair, ElementSelector, PlayerCard, StatusPip } = window.GameDevArcadeDesignSystem_67abce;
    function Demo() {
      const [el, setEl] = React.useState('fire');
      const [charge, setCharge] = React.useState(0);
      React.useEffect(() => {
        const t = setInterval(() => setCharge((c) => (c >= 1 ? 0 : c + 0.04)), 60);
        return () => clearInterval(t);
      }, []);
      return (
        <div className="wrap">
          <p className="cap">In-context HUD (charge animates · click an element)</p>
          <div className="scene">
            <div style={{ position: 'absolute', top: 12, left: '50%', transform: 'translateX(-50%)' }}><WaveBanner wave={3} trollsLeft={7} /></div>
            <div style={{ position: 'absolute', top: 12, right: 16 }}><ScorePill value={1240} /></div>
            <div style={{ position: 'absolute', left: '50%', top: '46%', transform: 'translate(-50%,-50%)' }}><Crosshair spread={charge} element={el} /></div>
            <div style={{ position: 'absolute', left: '50%', bottom: 70, transform: 'translateX(-50%)' }}><ChargeMeter value={charge} show /></div>
            <div style={{ position: 'absolute', left: 16, bottom: 14 }}><HealthBar value={72} label="Életerő" width={220} /></div>
            <div style={{ position: 'absolute', left: '50%', bottom: 14, transform: 'translateX(-50%)' }}><ElementSelector current={el} onSelect={setEl} /></div>
          </div>
          <div className="row">
            <div>
              <p className="cap">Co-op archers</p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8, width: 220 }}>
                <PlayerCard name="Áron" color="#36c5ff" hp={88} you />
                <PlayerCard name="Bea" color="#ffd27a" hp={64} />
                <PlayerCard name="Csaba" color="#9f6aff" hp={0} down />
                <PlayerCard name="Dóra" color="#5fd08a" hp={100} />
              </div>
            </div>
            <div>
              <p className="cap">Enemy status</p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 12, paddingTop: 4 }}>
                <StatusPip status="fire" label />
                <StatusPip status="ice" label />
                <StatusPip status="poison" label />
                <StatusPip status="lightning" label />
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
