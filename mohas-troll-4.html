<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mohás Berci 2.0 — az interaktív vén troll</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#141f36;height:100%;
    font-family:-apple-system,'Segoe UI',sans-serif;-webkit-user-select:none;user-select:none;}
  canvas{display:block;touch-action:none;}
  #title{position:fixed;top:max(10px, env(safe-area-inset-top));left:0;right:0;text-align:center;pointer-events:none;color:#e9d9ae;z-index:4;}
  #title .eyebrow{font:600 9px/1 inherit;letter-spacing:.4em;text-transform:uppercase;color:#8fa6c9;margin-bottom:5px;}
  #title .name{font:400 17px/1.1 Georgia,'Times New Roman',serif;text-shadow:0 2px 14px rgba(0,0,0,.6);}
  #title .name em{font-style:italic;color:#ffd27a;}
  #score{position:fixed;top:max(12px, env(safe-area-inset-top));left:14px;z-index:6;pointer-events:none;
    display:flex;align-items:center;gap:8px;color:#cfe0ff;
    background:rgba(14,22,40,.6);border:1px solid rgba(180,200,240,.18);border-radius:14px;
    padding:7px 12px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 4px 16px rgba(0,0,0,.35);}
  #score b{font:700 20px/1 inherit;color:#7fe2ff;min-width:20px;text-align:center;}
  #score small{font:600 9px/1.15 inherit;letter-spacing:.05em;text-transform:uppercase;color:#9db4d6;}
  #hint{position:fixed;top:44%;left:0;right:0;text-align:center;pointer-events:none;z-index:4;
    font:400 12.5px/1.7 inherit;color:#acbfdc;letter-spacing:.02em;padding:0 22px;
    opacity:1;transition:opacity 1.2s ease;text-shadow:0 1px 10px rgba(0,0,0,.7);}
  #hint b{color:#ffe7b8;font-weight:700;}
  #hint.hide{opacity:0;}
  #vignette{position:fixed;inset:0;pointer-events:none;z-index:1;
    background:radial-gradient(ellipse at 50% 42%, transparent 50%, rgba(6,10,22,.65) 100%);}
  #emotes{position:fixed;top:calc(max(10px, env(safe-area-inset-top)) + 40px);left:50%;transform:translateX(-50%);
    display:flex;gap:8px;z-index:6;}
  #emotes button{-webkit-tap-highlight-color:transparent;touch-action:manipulation;cursor:pointer;
    width:42px;height:42px;border-radius:50%;font-size:19px;
    background:rgba(18,28,50,.6);border:1px solid rgba(180,200,240,.16);color:#cfd9ec;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 4px 16px rgba(0,0,0,.35);
    transition:transform .1s ease, background .15s;}
  #emotes button:active{transform:scale(.88);background:rgba(40,58,96,.8);}
  #pad{position:fixed;left:max(18px, env(safe-area-inset-left));bottom:calc(max(18px, env(safe-area-inset-bottom)) + 8px);
    width:128px;height:128px;border-radius:50%;z-index:5;touch-action:none;
    background:radial-gradient(circle at 50% 50%, rgba(30,44,74,.42), rgba(18,28,50,.28));
    border:1px solid rgba(180,200,240,.16);box-shadow:0 6px 22px rgba(0,0,0,.35);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
  #stick{position:absolute;left:50%;top:50%;width:56px;height:56px;border-radius:50%;
    transform:translate(-50%,-50%);background:rgba(150,180,230,.34);
    border:1px solid rgba(210,225,255,.42);box-shadow:0 3px 12px rgba(0,0,0,.4);transition:background .15s;}
  #pad.active #stick{background:rgba(175,205,250,.55);}
  #pad .padhint{position:absolute;left:0;right:0;bottom:-20px;text-align:center;pointer-events:none;
    font:600 9px/1 inherit;letter-spacing:.14em;text-transform:uppercase;color:#8fa6c9;}
  #actions{position:fixed;right:max(16px, env(safe-area-inset-right));bottom:calc(max(18px, env(safe-area-inset-bottom)) + 8px);
    display:flex;flex-direction:column;align-items:center;gap:11px;z-index:5;}
  .gbtn{-webkit-tap-highlight-color:transparent;touch-action:manipulation;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
    border-radius:50%;color:#fff;border:1px solid rgba(255,255,255,.18);
    box-shadow:0 5px 20px rgba(0,0,0,.4);transition:transform .1s ease, filter .15s;}
  .gbtn:active{transform:scale(.9);filter:brightness(1.18);}
  .gbtn span{line-height:1;}
  .gbtn small{font:700 8px/1 inherit;letter-spacing:.05em;text-transform:uppercase;}
  #smashBtn{width:92px;height:92px;background:radial-gradient(circle at 50% 35%, #cf6a33, #7e2f1c);}
  #smashBtn span{font-size:33px;}
  #roarBtn{width:62px;height:62px;background:radial-gradient(circle at 50% 35%, #4f70da, #2a3f96);}
  #roarBtn span{font-size:21px;}
  #toast{position:fixed;left:50%;top:128px;transform:translateX(-50%) translateY(-8px);
    background:rgba(14,22,40,.82);border:1px solid rgba(255,210,122,.3);color:#ffe7b8;
    font:600 13px/1 inherit;letter-spacing:.04em;
    padding:9px 16px;border-radius:999px;opacity:0;pointer-events:none;z-index:7;
    transition:opacity .25s ease, transform .25s ease;box-shadow:0 6px 22px rgba(0,0,0,.4);}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="title">
  <div class="eyebrow">Mohás Berci · játék</div>
  <div class="name"><em>a vén troll</em> kalandja</div>
</div>
<div id="score"><b id="scoreN">0</b><small>gomba<br>szétzúzva</small></div>
<div id="emotes">
  <button data-a="wave">👋</button>
  <button data-a="dance">🕺</button>
  <button data-a="laugh">😂</button>
</div>
<div id="hint">Mozgás: <b>WASD</b> / húzd a joystickot&nbsp; · &nbsp;<b>Szóköz</b> = bunkócsapás&nbsp; · &nbsp;bökd meg Bercit!<br>Zúzd szét a világító gombákat a bunkóddal! 🍄</div>
<div id="vignette"></div>

<div id="pad"><div id="stick"></div><div class="padhint">Mozgás</div></div>
<div id="actions">
  <button id="smashBtn" class="gbtn"><span>💥</span><small>Zúz</small></button>
  <button id="roarBtn" class="gbtn"><span>🗯️</span><small>Üvölt</small></button>
</div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';

/* ================= Alap ================= */
const GROUND_Y = 0.07;
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const lerp  = (a,b,t)=>a+(b-a)*t;
const ss = (a,b,x)=>{ x=clamp((x-a)/(b-a),0,1); return x*x*(3-2*x); };

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x141f36);
scene.fog = new THREE.Fog(0x141f36, 11, 30);

const camera = new THREE.PerspectiveCamera(46, innerWidth/innerHeight, 0.1, 120);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.12;
document.body.appendChild(renderer.domElement);

/* ================= Procedurális textúrák ================= */
function glowTexture(){
  const c=document.createElement('canvas'); c.width=c.height=64;
  const x=c.getContext('2d');
  const g=x.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(.35,'rgba(255,255,255,.55)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g; x.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}
function noiseTexture(size, blobs, light, dark){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const x=c.getContext('2d');
  x.fillStyle='#808080'; x.fillRect(0,0,size,size);
  for(let i=0;i<blobs;i++){
    x.fillStyle = Math.random()<.5 ? light : dark;
    x.globalAlpha = .08+Math.random()*.12;
    x.beginPath();
    x.arc(Math.random()*size, Math.random()*size, 1+Math.random()*4, 0, 6.3);
    x.fill();
  }
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(3,3);
  return t;
}
function mossTexture(){
  const c=document.createElement('canvas'); c.width=c.height=256;
  const x=c.getContext('2d');
  x.fillStyle='#41704e'; x.fillRect(0,0,256,256);
  const cols=['#4e8159','#36603f','#5d8f5f','#3a6a48'];
  for(let i=0;i<800;i++){
    x.fillStyle=cols[i%4]; x.globalAlpha=.4;
    x.beginPath();
    x.arc(Math.random()*256, Math.random()*256, 1+Math.random()*4, 0, 6.3);
    x.fill();
  }
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(2,2);
  return t;
}
const GLOW   = glowTexture();
const SKIN_N = noiseTexture(128, 500, '#aaaaaa', '#555555');
const MOSS_T = mossTexture();

/* ================= Fények ================= */
scene.add(new THREE.HemisphereLight(0x90a8d8, 0x3c5040, 0.5));
const key = new THREE.DirectionalLight(0xffb37a, 1.15);
key.position.set(6, 9, 5);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left=-6; key.shadow.camera.right=6;
key.shadow.camera.top=7;   key.shadow.camera.bottom=-6;
key.shadow.camera.near=1;  key.shadow.camera.far=26;
key.shadow.bias=-0.0004; key.shadow.normalBias=0.025;
scene.add(key);
const fill = new THREE.DirectionalLight(0x6f86d6, 0.32);
fill.position.set(-6, 4, -2); scene.add(fill);
const rim = new THREE.DirectionalLight(0x9fd8ff, 0.6);
rim.position.set(-2, 5, -8); scene.add(rim);

/* ================= Anyagok ================= */
const std = (o)=> new THREE.MeshStandardMaterial(Object.assign({roughness:.85, metalness:0, flatShading:true}, o));
const skinMat  = std({color:0x6fa07a, bumpMap:SKIN_N, bumpScale:0.012});
const skinDark = std({color:0x5b8a68, bumpMap:SKIN_N, bumpScale:0.012});
const bellyMat = std({color:0xa8c79b, bumpMap:SKIN_N, bumpScale:0.01});
const hairMat  = std({color:0x33523f, roughness:.95});
const tuskMat  = std({color:0xf2e9d8, roughness:.45});
const wartMat  = std({color:0x9dc4a0});
const clothMat = std({color:0x6b4a2f, roughness:1, bumpMap:SKIN_N, bumpScale:0.02});
const ropeMat  = std({color:0x9a7b4f, roughness:1});
const leatherM = std({color:0x5a4030, roughness:.95});
const woodMat  = std({color:0x8a6240, roughness:.9, bumpMap:SKIN_N, bumpScale:0.025});
const woodDark = std({color:0x4f3722, roughness:.95});
const goldMat  = new THREE.MeshStandardMaterial({color:0xc9a14e, metalness:.65, roughness:.3});
const rockMat  = std({color:0x5e6672, roughness:.95, bumpMap:SKIN_N, bumpScale:0.04});
const mossMat  = std({color:0x9fb59f, roughness:1, map:MOSS_T, bumpMap:MOSS_T, bumpScale:0.05});
const stemMat  = std({color:0xe8dcc2, roughness:.8});
const capMat   = std({color:0xd24a43, roughness:.7});
const dotMat   = std({color:0xf5efe2, roughness:.6});
const grassMat = std({color:0x4f9d5c, roughness:1});
const mouthMat = std({color:0x4a1717, roughness:1});
const tongueM  = std({color:0xc96a63, roughness:.7});
const eyeMat   = new THREE.MeshStandardMaterial({color:0x2a1c08, emissive:0xffac3d, emissiveIntensity:1.6, roughness:.4});
const glowCapM = new THREE.MeshStandardMaterial({color:0x16414f, emissive:0x36c5ff, emissiveIntensity:1.3, roughness:.6, flatShading:true});
/* --- 3.0 extra anyagok --- */
const lichenMat = std({color:0xbcd0c2, roughness:1, map:MOSS_T, bumpMap:MOSS_T, bumpScale:0.04});
const mossDeep  = std({color:0x5e7d5a, roughness:1, map:MOSS_T, bumpMap:MOSS_T, bumpScale:0.06});
const leafMat   = std({color:0xb5702e, roughness:.9, side:THREE.DoubleSide});
const leafMat2  = std({color:0x9c8a33, roughness:.9, side:THREE.DoubleSide});
const leafMat3  = std({color:0x7a4322, roughness:.9, side:THREE.DoubleSide});
const fernMat   = std({color:0x3f6e44, roughness:.95});
const fernStemM = std({color:0x6f8a3e, roughness:.95});
const vineMat   = std({color:0x55692f, roughness:.95});
const veinMat   = std({color:0x52795f, roughness:.8});
const pupilMat  = new THREE.MeshStandardMaterial({color:0x1a0d02, roughness:.35});
const scarMat   = std({color:0x86a78f, roughness:.8});

function mesh(geo, mat, x,y,z, sx,sy,sz){
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x||0, y||0, z||0);
  if(sx!==undefined) m.scale.set(sx, sy===undefined?sx:sy, sz===undefined?sx:sz);
  m.castShadow = true; m.receiveShadow = true;
  return m;
}
function jitter(geo, axz, ay, keepTopY){
  const p = geo.attributes.position;
  for(let i=0;i<p.count;i++){
    p.setX(i, p.getX(i)+(Math.random()-0.5)*axz);
    p.setZ(i, p.getZ(i)+(Math.random()-0.5)*axz);
    const y = p.getY(i);
    if(keepTopY===undefined || y < keepTopY-0.01) p.setY(i, y+(Math.random()-0.5)*ay);
  }
  geo.computeVertexNormals();
  return geo;
}

/* moha/zuzmó folt: pár lapított gömböcske egy pont köré szórva */
function mossPatch(parent, x,y,z, spread, count, mat){
  const m = mat || mossDeep;
  for(let i=0;i<count;i++){
    const bx = x + (Math.random()-0.5)*spread;
    const by = y + (Math.random()-0.5)*spread*0.45;
    const bz = z + (Math.random()-0.5)*spread;
    const s  = 0.55 + Math.random()*0.95;
    const b  = mesh(new THREE.SphereGeometry(0.07,6,5), m, bx,by,bz, s, s*0.5, s);
    b.castShadow = false;
    parent.add(b);
  }
}

const pickList = []; // raycast célpontok

/* ================= A TROLL ================= */
const troll = new THREE.Group();
troll.position.y = GROUND_Y;
scene.add(troll);

/* --- lábak csípő-pivottal (járás közben lépnek) --- */
const legs = {};
[-1,1].forEach(s=>{
  const leg = new THREE.Group();
  leg.position.set(s*0.34, 0.78, 0); // csípő
  leg.add(mesh(new THREE.CylinderGeometry(0.21,0.27,0.62,9), skinMat, 0, -0.32, 0));
  leg.add(mesh(new THREE.SphereGeometry(0.11,8,6), skinDark, 0, -0.23, 0.2)); // térdkalács
  const ank = mesh(new THREE.TorusGeometry(0.24,0.045,6,12), clothMat, 0, -0.57, 0);
  ank.rotation.x = Math.PI/2; leg.add(ank);
  leg.add(mesh(new THREE.SphereGeometry(0.3,9,7), skinMat, s*0.02, -0.62, 0.14, 1.15,0.6,1.5));
  [-0.12,0,0.12].forEach(off=>{
    leg.add(mesh(new THREE.SphereGeometry(0.085,7,6), skinMat, s*0.02+off, -0.66, 0.55));
    const nail = mesh(new THREE.ConeGeometry(0.045,0.07,5), tuskMat, s*0.02+off, -0.645, 0.62);
    nail.rotation.x = 1.25; leg.add(nail);
  });
  troll.add(leg);
  legs[s<0?'L':'R'] = leg;
});

/* --- törzs --- */
const belly = mesh(new THREE.SphereGeometry(0.88,13,10), skinMat, 0, 1.12, 0, 1,0.92,0.86);
troll.add(belly);
const chest = mesh(new THREE.SphereGeometry(0.62,12,9), skinMat, 0, 1.62, -0.06, 1.05,0.8,0.8);
troll.add(chest);
const bellyPatch = mesh(new THREE.SphereGeometry(0.62,11,9), bellyMat, 0, 1.04, 0.40, 1,0.85,0.55);
troll.add(bellyPatch);
troll.add(mesh(new THREE.SphereGeometry(0.05,7,6), std({color:0x4e7257}), 0, 0.97, 0.73)); // köldök
[-1,1].forEach(s=> troll.add(mesh(new THREE.SphereGeometry(0.27,9,7), skinMat, s*0.27, 1.56, 0.4, 1,0.7,0.6))); // mellizmok
[[0,1.78,-0.5,0.12],[0,1.58,-0.55,0.1],[0,1.38,-0.56,0.085]].forEach(p=>
  troll.add(mesh(new THREE.SphereGeometry(p[3],7,6), skinDark, p[0],p[1],p[2]))); // gerinc-dudorok
[-1,1].forEach(s=> troll.add(mesh(new THREE.SphereGeometry(0.3,9,7), skinMat, s*0.6, 1.78, -0.02)));

/* --- ágyékkötő, öv, erszény --- */
troll.add(mesh(new THREE.CylinderGeometry(0.8,1.0,0.5,10), clothMat, 0, 0.74, 0));
const flapF = mesh(new THREE.BoxGeometry(0.55,0.5,0.06), clothMat, 0, 0.55, 0.78); flapF.rotation.x = 0.15; troll.add(flapF);
const flapB = mesh(new THREE.BoxGeometry(0.55,0.45,0.06), clothMat, 0, 0.57, -0.76); flapB.rotation.x = -0.12; troll.add(flapB);
const belt = mesh(new THREE.TorusGeometry(0.92,0.05,6,16), ropeMat, 0, 0.98, 0, 1,1,0.92);
belt.rotation.x = Math.PI/2; troll.add(belt);
troll.add(mesh(new THREE.SphereGeometry(0.09,7,6), ropeMat, 0.64, 0.98, 0.6)); // csomó
troll.add(mesh(new THREE.SphereGeometry(0.16,8,7), leatherM, 0.74, 0.76, 0.45, 1,1.2,0.7)); // erszény
troll.add(mesh(new THREE.BoxGeometry(0.05,0.18,0.04), leatherM, 0.71, 0.92, 0.5));

/* --- nyaklánc fogakkal és fagyöngyökkel --- */
const neckl = new THREE.Group();
neckl.position.set(0,1.95,0.06); neckl.rotation.x = 0.32;
const nstring = mesh(new THREE.TorusGeometry(0.4,0.015,5,18), leatherM, 0,0,0);
nstring.rotation.x = Math.PI/2; neckl.add(nstring);
for(let i=0;i<7;i++){
  const a = -1.15 + i*(2.3/6);
  const x = Math.sin(a)*0.4, z = Math.cos(a)*0.4;
  if(i%2===0){
    const tooth = mesh(new THREE.ConeGeometry(0.035,0.13,6), tuskMat, x, -0.07, z);
    tooth.rotation.x = Math.PI; neckl.add(tooth);
  } else neckl.add(mesh(new THREE.SphereGeometry(0.05,7,6), woodMat, x, -0.03, z));
}
troll.add(neckl);

/* --- vállvért (jobb) + szőrme (bal) --- */
const pauldron = mesh(new THREE.SphereGeometry(0.36,9,6,0,Math.PI*2,0,Math.PI/2), woodMat, 0.63,1.9,-0.02);
pauldron.rotation.z = -0.25; troll.add(pauldron);
[[0.6,2.12,0.08],[0.72,2.1,-0.12],[0.5,2.14,-0.05]].forEach(p=>{
  troll.add(mesh(new THREE.ConeGeometry(0.04,0.13,5), tuskMat, p[0],p[1],p[2]));
});
const strap = mesh(new THREE.BoxGeometry(0.09,0.75,0.04), leatherM, 0.18, 1.48, 0.55);
strap.rotation.z = 0.55; strap.rotation.x = 0.1; troll.add(strap);
for(let i=0;i<6;i++){
  const f = mesh(new THREE.ConeGeometry(0.06,0.18+Math.random()*0.08,5), hairMat,
    -0.62+(Math.random()-0.5)*0.22, 1.98, (Math.random()-0.5)*0.22);
  f.rotation.set((Math.random()-0.5)*0.8, Math.random()*3, (Math.random()-0.5)*0.8);
  troll.add(f);
}

/* --- nyak + FEJ --- */
troll.add(mesh(new THREE.CylinderGeometry(0.28,0.34,0.3,9), skinMat, 0, 1.86, 0.08));
const head = new THREE.Group();
head.position.set(0, 2.06, 0.16);
troll.add(head);

head.add(mesh(new THREE.SphereGeometry(0.5,13,11), skinMat, 0,0,0, 1,0.92,0.96));
head.add(mesh(new THREE.SphereGeometry(0.2,8,6), mouthMat, 0,-0.18,0.28, 1,0.5,0.6)); // szájüreg-árnyék

/* állkapocs-csukló: nyitható száj */
const jawPivot = new THREE.Group();
jawPivot.position.set(0,-0.16,-0.02);
head.add(jawPivot);
jawPivot.add(mesh(new THREE.SphereGeometry(0.34,11,8), skinMat, 0,-0.14,0.16, 1.15,0.62,0.9));
jawPivot.add(mesh(new THREE.SphereGeometry(0.2,8,6), mouthMat, 0,-0.1,0.12, 0.95,0.5,0.8));
jawPivot.add(mesh(new THREE.SphereGeometry(0.12,8,6), tongueM, 0,-0.18,0.24, 0.85,0.35,1.2));
[-0.12,-0.04,0.04,0.12].forEach(x=>{
  const tt = mesh(new THREE.ConeGeometry(0.028,0.09,5), tuskMat, x, -0.2, 0.36);
  tt.rotation.x = -0.2; jawPivot.add(tt);
});
[-1,1].forEach(s=>{
  const tusk = mesh(new THREE.ConeGeometry(0.055,0.27,6), tuskMat, s*0.17, -0.18, 0.38);
  tusk.rotation.x = -0.32; tusk.rotation.z = s*0.14;
  jawPivot.add(tusk);
});
[[ -0.1,-0.34,0.26],[0.04,-0.36,0.28],[0.14,-0.33,0.24],[-0.02,-0.38,0.2]].forEach((p,i)=>{
  const b = mesh(new THREE.ConeGeometry(0.05,0.2+i*0.04,5), hairMat, p[0],p[1],p[2]);
  b.rotation.x = 0.5; jawPivot.add(b); // szakáll

function mushroom(x,z,sc,glow,y){

  } else {
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW, color:0x7fe2ff, transparent:true, opacity:0.5, depthWrite:false}));
    sp.scale.setScalar(0.9); sp.position.y = 0.5; g.add(sp);
  }
  g.traverse(o=>{ if(o.isMesh){ o.userData.mush = g; pickList.push(o); }});

  g.userData.glow = !!glow;
  g.userData.alive = true;
  g.userData.respawnAt = 0;

}

function fern(x,z, sc, rot){
  const g = new THREE.Group();
  g.position.set(x, GROUND_Y, z);
  g.rotation.y = rot===undefined ? Math.random()*6.28 : rot;
  g.scale.setScalar(sc||1);
  const fronds = 5;
  for(let f=0; f<fronds; f++){
    const a = (f/(fronds-1)-0.5)*1.7;
    const fr = new THREE.Group();
    fr.rotation.z = a; fr.rotation.x = -0.35 - Math.random()*0.1;
    const len = 0.55 + Math.random()*0.25;
    fr.add(mesh(new THREE.CylinderGeometry(0.01,0.022,len,5), fernStemM, 0, len/2, 0));
    const pairs = 5;
    for(let p=1;p<=pairs;p++){
      const yy = (p/pairs)*len*0.92;
      const sz = (1 - (p/pairs)*0.65)*0.13;
      [-1,1].forEach(side=>{
        const lf = mesh(new THREE.ConeGeometry(sz*0.4, sz*2.0, 4), fernMat, side*sz*0.6, yy, 0);
        lf.rotation.z = side*1.15; lf.rotation.x = -0.2; lf.castShadow = false;
        fr.add(lf);
      });
    }
    g.add(fr);
  }
  g.userData.phase = Math.random()*6.28;
  g.userData.baseScale = sc||1;
  swayers.push(g);
  scene.add(g);
}

function vine(px,py,pz, len){
  const v=new THREE.Group(); v.position.set(px,py,pz);
  const seg=Math.max(2, Math.floor(len/0.18));
  let y=0;
  for(let i=0;i<seg;i++){
    const sx=Math.sin(i*0.7)*0.035;
    v.add(mesh(new THREE.CylinderGeometry(0.016,0.02,0.18,5), vineMat, sx, y-0.09, 0));
    if(i%2===0){
      const lf=mesh(new THREE.ConeGeometry(0.028,0.085,4), fernMat, sx+((i%4)?0.05:-0.05), y-0.05, 0.02);
      lf.rotation.z=(i%4)?1.0:-1.0; lf.castShadow=false; v.add(lf);
    }
    y-=0.18;
  }
  v.traverse(o=>{ if(o.isMesh) o.castShadow=false; });
  tree.add(v);
}

let lastInteract = 0;
const cv = renderer.domElement;
const pointers = new Map();
let pinchDist = null, gestureMax = 0;
let downX = 0, downY = 0, downT = 0;

cv.addEventListener('pointerdown', e=>{
  pointers.set(e.pointerId, [e.clientX, e.clientY]);
  gestureMax = Math.max(gestureMax, pointers.size);
  downX = e.clientX; downY = e.clientY; downT = performance.now();
  lastInteract = clock ? clock.getElapsedTime() : 0;
});
cv.addEventListener('pointermove', e=>{
  if(!pointers.has(e.pointerId) || pointers.size !== 1) return;
  const prev = pointers.get(e.pointerId);
  thetaT -= (e.clientX - prev[0]) * 0.0055;
  phiT   -= (e.clientY - prev[1]) * 0.0045;
  phiT = clamp(phiT, 0.4, 1.5);
  pointers.set(e.pointerId, [e.clientX, e.clientY]);
  lastInteract = clock.getElapsedTime();
});
function release(e){
  const wasSize = pointers.size;
  pointers.delete(e.pointerId);
  pinchDist = null;
  if(wasSize===1 && pointers.size===0){
    const moved = Math.hypot(e.clientX-downX, e.clientY-downY);
    const dt = performance.now()-downT;
    if(gestureMax===1 && moved<10 && dt<400) tap(e.clientX, e.clientY);
    gestureMax = 0;
  }
}
cv.addEventListener('pointerup', release);
cv.addEventListener('pointercancel', e=>{ pointers.delete(e.pointerId); pinchDist=null; gestureMax=0; });
cv.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(e.touches.length === 2){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d = Math.hypot(dx,dy);
    if(pinchDist) radiusT = clamp(radiusT * pinchDist / d, 4.0, 12.5);
    pinchDist = d;
    lastInteract = clock.getElapsedTime();
  }
}, {passive:false});
cv.addEventListener('wheel', e=>{
  radiusT = clamp(radiusT + e.deltaY*0.004, 4.0, 12.5);
  lastInteract = clock.getElapsedTime();
}, {passive:true});

let joyX = 0, joyY = 0, joyId = null;
const padEl = document.getElementById('pad');
const stickEl = document.getElementById('stick');
const PAD_R = 46;
function joyStart(e){
  joyId = e.pointerId; padEl.classList.add('active');
  try{ padEl.setPointerCapture(e.pointerId); }catch(_){}
  joyMove(e);
}
function joyMove(e){
  if(e.pointerId !== joyId) return;
  const r = padEl.getBoundingClientRect();
  let dx = e.clientX - (r.left + r.width/2);
  let dy = e.clientY - (r.top + r.height/2);
  const len = Math.hypot(dx,dy) || 1;
  if(len > PAD_R){ dx = dx/len*PAD_R; dy = dy/len*PAD_R; }
  stickEl.style.transform = 'translate(calc(-50% + '+dx+'px), calc(-50% + '+dy+'px))';
  joyX = dx/PAD_R; joyY = dy/PAD_R;
}
function joyEnd(e){
  if(e.pointerId !== joyId) return;
  joyId = null; joyX = 0; joyY = 0;
  padEl.classList.remove('active');
  stickEl.style.transform = 'translate(-50%,-50%)';
}

/* ================= Fő ciklus ================= */
const clock = new THREE.Clock();
let nextBlink = 2.2, blinkAt = -10;
let prevT = 0;
const headWorld = new THREE.Vector3();

function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = Math.min(t - prevT, 0.05); prevT = t;
  const breathe = Math.sin(t*1.5);

  /* ---- alap (idle) póz ---- */
  let rootY = GROUND_Y + Math.sin(t*1.5)*0.013;
  let rootRX = 0, rootRY = 0, rootRZ = Math.sin(t*0.8)*0.013;
  let hX = BASE.headX + Math.sin(t*0.9)*0.02;
  let hY = Math.sin(t*0.45)*0.13;
  let hZ = 0;
  let jawOpen = 0.03 + breathe*0.015;
  let aLx = BASE.aLx + Math.sin(t*1.5+1)*0.05, aLz = BASE.aLz, aLex = BASE.aLex, aLez = 0;
  let aRx = BASE.aRx + Math.sin(t*1.5+2.2)*0.03, aRz = BASE.aRz, aRex = BASE.aRex;
  let bellyS = 1 + breathe*0.022;
  let eyeSY = 1, eyeS = 1;
  let glowI = 1.45 + Math.sin(t*2.1)*0.25;
  let earW = 0;
  let cX = BASE.clubX, cZ = BASE.clubZ, cY = 0, cRX = BASE.clubRX, cRZ = BASE.clubRZ;

  /* pislogás */
  if(t > nextBlink){ blinkAt = t; nextBlink = t + 2.2 + Math.random()*3.2; }
  const bs = t - blinkAt;
  if(bs < 0.14) eyeSY = Math.max(0.08, Math.abs(bs/0.07 - 1));

  /* ---- akciók rárakódnak az idle-re ---- */
  if(action){
    const p = (t - action.start) / DUR[action.name];
    if(p >= 1){ action = null; }
    else {
      const n = action.name;
      if(n==='wave'){
        const g = ss(0,0.18,p) * (1-ss(0.82,1,p));
        aLz += g * (-2.2);
        aLx += g * 0.2;
        aLex += g * 0.3;
        aLez = g * Math.sin(p*Math.PI*6) * 0.55;
        hZ += g * -0.12;
        jawOpen += g * 0.12;
        eyeSY = Math.min(eyeSY, 1 - g*0.3);
      }
      else if(n==='roar'){
        const e = Math.sin(Math.min(p,1)*Math.PI);
        jawOpen += e * 0.85;
        hX += e * -0.38;
        rootRX += e * -0.07;
        rootY += e * 0.05;
        aLz += e * -1.1; aRz += e * 1.1;
        aLx += e * -0.5; aRx += e * 0.3;
        aLex += e * 0.4; aRex += e * 0.4;
        eyeS = 1 + e*0.35;
        glowI = 1.45 + e*2.6;
        earW = e * -0.5;
        if(p>0.5 && p<0.85) shake = Math.max(shake, 0.07);
        if(!action.fired && p>0.22){
          action.fired = true;
          head.getWorldPosition(headWorld);
          spawnBlast(headWorld.x, headWorld.y-0.25, headWorld.z+0.55);
          puffBreath(); puffBreath();
          flee = 1;
          shake = 0.16;
        }
      }
      else if(n==='dance'){
        const w = Math.sin(Math.min(p,1)*Math.PI);
        rootRY = Math.sin(p*Math.PI*4)*0.45*w + ss(0.72,1,p)*Math.PI*2;
        rootRZ += Math.sin(p*Math.PI*8)*0.06*w;
        rootY += Math.abs(Math.sin(p*Math.PI*8))*0.06*w;
        hX += Math.sin(p*Math.PI*8)*0.1*w;
        hZ += Math.sin(p*Math.PI*4)*0.12*w;
        const sw = Math.sin(p*Math.PI*8);
        aLz += w*(-0.9 - sw*0.6);
        aRz += w*( 0.9 - sw*0.6);
        aLex += w*(-0.6 + sw*0.3);
        aRex += w*(-0.6 - sw*0.3);
        jawOpen += w*0.15;
        earW = sw*0.25*w;
      }
      else if(n==='slam'){
        const lift = ss(0,0.32,p) * (1-ss(0.36,0.5,p));
        const down = ss(0.36,0.5,p);
        const ret  = 1 - ss(0.62,1,p);
        cRZ += (lift*1.55 + down*(-0.62)) * ret;
        cRX += (lift*(-0.5)) * ret;
        cY  += (lift*1.05) * ret;
        cX  += (down*(-0.3)) * ret;
        cZ  += (down*0.6) * ret;
        aRx += (lift*(-1.7) + down*0.55) * ret;
        aRz += (lift*0.5) * ret;
        aRex += (lift*(-0.9)) * ret;
        rootRX += (lift*(-0.1) + down*0.16) * ret;
        rootY  += (down*(-0.08)) * ret;
        hX += (down*0.2) * ret;
        if(!action.fired && p>0.55){
          action.fired = true;
          clubHead.getWorldPosition(clubWorld);
          const wx = clubWorld.x, wz = clubWorld.z;
          burstDust(wx, 0.15, wz, 16);
          spawnRing(wx, wz);
          shake = 0.3;
          flee = Math.max(flee, 0.7);
          swayers.forEach(g=> g.userData.boingT = t);
          /* a bunkó körüli gombák szétzúzása */
          let smashed = 0;
          for(const m of smashables){
            if(!m.userData.alive) continue;
            const dx = m.position.x - wx, dz = m.position.z - wz;
            if(dx*dx + dz*dz < 1.5*1.5){
              m.userData.alive = false;
              m.userData.respawnAt = t + 7 + Math.random()*4;
              m.visible = false;
              burstDust(m.position.x, 0.2, m.position.z, 12);
              spawnRing(m.position.x, m.position.z);
              smashed++;
            }
          }
          if(smashed){ addScore(smashed); shake = Math.max(shake, 0.4); toast('🍄 +'+smashed+'!'); }
        }
      }
      else if(n==='laugh'){
        const L = Math.sin(Math.min(p,1)*Math.PI);
        const ha = Math.abs(Math.sin(p*Math.PI*6));
        rootY += ha*0.05*L;
        bellyS += ha*0.1*L;
        hX += L*(-0.28) + ha*0.05;
        jawOpen += (0.2 + ha*0.3)*L;
        eyeSY = Math.min(eyeSY, 1 - L*0.7);
        aLx += L*(-0.65); aRx += L*(-0.4);
        aLz += L*0.18;  aRz += L*(-0.18);
        aLex += L*(-1.1); aRex += L*(-0.9);
        earW = Math.sin(p*Math.PI*10)*0.15*L;
      }
    }
  }

  /* ---- mozgás (járás) ---- */
  const inp = readInput();
  const fX = -Math.sin(theta), fZ = -Math.cos(theta); // kamerától befelé
  const rX =  Math.cos(theta), rZ = -Math.sin(theta); // jobbra
  const mX = fX*(-inp.iy) + rX*inp.ix;
  const mZ = fZ*(-inp.iy) + rZ*inp.ix;
  velX += (mX*MOVE_SPEED - velX) * Math.min(1, dt*10);
  velZ += (mZ*MOVE_SPEED - velZ) * Math.min(1, dt*10);
  trollX += velX*dt; trollZ += velZ*dt;
  const rr = Math.hypot(trollX, trollZ);
  if(rr > PLAY_RADIUS){ trollX = trollX/rr*PLAY_RADIUS; trollZ = trollZ/rr*PLAY_RADIUS; }
  for(const o of obstacles){
    const ox=trollX-o.x, oz=trollZ-o.z, od=Math.hypot(ox,oz), omin=o.r+0.55;
    if(od < omin && od > 1e-4){ trollX = o.x+ox/od*omin; trollZ = o.z+oz/od*omin; }
  }
  const speed = Math.hypot(velX, velZ);
  moveAmt += (Math.min(speed/MOVE_SPEED,1) - moveAmt) * Math.min(1, dt*8);
  walkPhase += dt * (7 + speed*2.2);
  if(speed > 0.15){
    const desired = Math.atan2(velX, velZ);
    let dd = desired - trollYaw;
    while(dd >  Math.PI) dd -= Math.PI*2;
    while(dd < -Math.PI) dd += Math.PI*2;
    trollYaw += dd * Math.min(1, dt*9);
  }
  const bobY  = Math.abs(Math.sin(walkPhase)) * 0.05 * moveAmt;
  const rollZ = Math.sin(walkPhase) * 0.05 * moveAmt;
  const leanX = 0.16 * moveAmt;
  const legSw = Math.sin(walkPhase) * 0.55 * moveAmt;
  const armSw = Math.sin(walkPhase) * 0.50 * moveAmt;

  /* ---- póz alkalmazása ---- */
  troll.position.set(trollX, rootY + bobY, trollZ);
  troll.rotation.set(rootRX + leanX, trollYaw + rootRY, rootRZ + rollZ);
  legs.L.rotation.x =  legSw;
  legs.R.rotation.x = -legSw;
  head.rotation.set(hX, hY, hZ);
  jawPivot.rotation.x = jawOpen;
  armL.g.rotation.x = aLx - armSw; armL.g.rotation.z = aLz;
  armL.elbow.rotation.x = aLex; armL.elbow.rotation.z = aLez;
  armR.g.rotation.x = aRx + armSw*0.3; armR.g.rotation.z = aRz;
  armR.elbow.rotation.x = aRex;
  belly.scale.set(bellyS, 0.92 + (bellyS-1)*0.5, 0.86);
  chest.position.y = 1.62 + breathe*0.012;
  eyes.forEach(e=> e.scale.set(eyeS, eyeS*eyeSY, eyeS));
  eyeMat.emissiveIntensity = glowI;
  eyeGlows.forEach(s=>{ s.material.opacity = 0.2 + glowI*0.14; });
  ears[0].rotation.z = ears[0].userData.baseZ + Math.sin(t*2.3)*0.05 + earW;
  ears[1].rotation.z = ears[1].userData.baseZ + Math.sin(t*2.3+1.5)*0.05 - earW;
  /* a bunkó a jobb kézhez van kötve — a kar mozgása viszi (lásd slam) */

  /* ---- effektek ---- */
  for(const d of dustPool){
    if(d.life > 0.9) continue;
    d.life += dt;
    d.m.position.x += d.vx*dt;
    d.m.position.z += d.vz*dt;
    d.m.position.y += d.vy*dt;
    d.vy -= 8.5*dt;
    const k = Math.max(0.001, (0.9 - d.life)/0.9);
    d.m.scale.setScalar(d.s * k);
    if(d.life > 0.9) d.m.visible = false;
  }
  for(const r of rings){
    if(r.life > 0.6) continue;
    r.life += dt;
    const k = r.life/0.6;
    r.m.scale.setScalar(0.35 + k*6);
    r.m.material.opacity = 0.55*(1-k);
    if(r.life > 0.6) r.m.visible = false;
  }
  for(const b of blasts){
    if(b.life > 0.5) continue;
    b.life += dt;
    const k = b.life/0.5;
    b.m.scale.setScalar(0.6 + k*4.5);
    b.m.material.opacity = 0.85*(1-k);
    if(b.life > 0.5) b.m.visible = false;
  }

  /* ---- szentjánosbogarak ---- */
  flee *= Math.pow(0.4, dt);
  for(let i=0;i<FCOUNT;i++){
    const s = fSeed[i];
    const bx = fBase[i*3], bz = fBase[i*3+2];
    const len = Math.max(0.2, Math.hypot(bx,bz));
    fPos[i*3]   = bx + Math.sin(t*s[0]+s[1])*0.32 + (bx/len)*flee*1.2;
    fPos[i*3+1] = fBase[i*3+1] + Math.sin(t*s[0]*0.8+s[2])*0.22 + flee*0.4;
    fPos[i*3+2] = bz + Math.cos(t*s[0]+s[1])*0.32 + (bz/len)*flee*1.2;
  }
  fGeo.attributes.position.needsUpdate = true;
  fMat.size = 0.13 + Math.sin(t*3)*0.03;

  /* ---- spórák, köd, lehelet ---- */
  for(let i=0;i<SPCOUNT;i++){
    const s = spSeed[i];
    spPos[i*3]   += Math.sin(t*s[0]+s[1])*0.0008;
    spPos[i*3+1] += s[2]*dt*0.16;
    spPos[i*3+2] += Math.cos(t*s[0]*0.7+s[1])*0.0008;
    if(spPos[i*3+1] > 4.3){ spPos[i*3+1] = 0; }
  }
  spGeo.attributes.position.needsUpdate = true;
  for(const m of mistSprites){
    m.userData.a += m.userData.spd*dt*0.25;
    m.position.x = Math.cos(m.userData.a)*m.userData.r;
    m.position.z = Math.sin(m.userData.a)*m.userData.r;
    m.material.opacity = 0.10 + Math.sin(t*0.4 + m.userData.ph)*0.04;
  }
  if(t > nextBreath){ puffBreath(); nextBreath = t + 3.2 + Math.random()*2.2; }
  for(const b of breathPool){
    if(b.life > 1.7) continue;
    b.life += dt;
    b.m.position.x += b.vx*dt;
    b.m.position.y += b.vy*dt;
    b.m.position.z += b.vz*dt;
    b.vy *= 0.985; b.vz *= 0.975;
    const k = b.life/1.7;
    b.m.scale.setScalar(0.14 + k*0.72);
    b.m.material.opacity = Math.sin(k*Math.PI)*0.30;
    if(b.life > 1.7) b.m.visible = false;
  }

  /* ---- gombák, fű: szellő + boing ---- */
  for(const g of swayers){
    g.rotation.z = Math.sin(t*1.8 + g.userData.phase)*0.06;
    let s = g.userData.baseScale;
    if(g.userData.boingT !== undefined){
      const bt = t - g.userData.boingT;
      if(bt < 1.2) s *= 1 + Math.exp(-bt*5)*Math.sin(bt*26)*0.28;
    }
    g.scale.setScalar(s);
  }

  /* ---- lámpás pislákolás ---- */
  const fl = 1.05 + Math.sin(t*9)*0.1 + Math.sin(t*23+1)*0.07;
  lampLight.intensity = fl;
  lampGlow.material.opacity = 0.55 + fl*0.22;
  lampCore.material.emissiveIntensity = 1.5 + fl*0.5;

  /* ---- gombák újraéledése ---- */
  for(const m of smashables){
    if(!m.userData.alive && t > m.userData.respawnAt){
      m.userData.alive = true;
      m.visible = true;
      m.userData.boingT = t; // visszapattan
      spawnRing(m.position.x, m.position.z);
    }
  }

  /* ---- kamera (követi a trollt) ---- */
  target.x += (trollX - target.x) * Math.min(1, dt*6);
  target.z += (trollZ - target.z) * Math.min(1, dt*6);
  if(t - lastInteract > 3 && !action && moveAmt < 0.04) thetaT += 0.0017;
  theta  += (thetaT - theta)*0.09;
  phi    += (phiT   - phi)*0.09;
  radius += (radiusT- radius)*0.09;
  camera.position.set(
    target.x + radius*Math.sin(phi)*Math.sin(theta),
    target.y + radius*Math.cos(phi),
    target.z + radius*Math.sin(phi)*Math.cos(theta)
  );
  camera.lookAt(target);
  if(shake > 0.002){
    camera.position.x += (Math.random()-0.5)*shake;
    camera.position.y += (Math.random()-0.5)*shake;
    camera.position.z += (Math.random()-0.5)*shake;
    shake *= Math.pow(0.02, dt);
  }

  renderer.render(scene, camera);
}
animate();

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
setTimeout(()=> document.getElementById('hint').classList.add('hide'), 8000);
})();
</script>
</body>
</html>
