# =============================================================================
#  Troll Hunting co-op server — docker-compose
# =============================================================================
#  Run:    docker compose up --build
#  Then:   open http://localhost:8080  (lobby) or .../mohas-roham.html (game)
#  WS:     ws://localhost:8080/ws
#
#  TRANSPORT NOTE: this game uses NO camera, so the getUserMedia secure-context
#  rule does NOT apply. ws:// is fine on localhost. For LAN / cross-origin, put
#  this behind a TLS terminator and use wss:// (and serve the page over https://
#  so the browser doesn't block ws:// as mixed content).
# =============================================================================
services:
  mp-server:
    build: .
    image: mohas-roham-mp-server:0.1.0
    container_name: mohas-roham-mp
    ports:
      # host:container — change the host side to remap (e.g. "9090:8080").
      # 8090 a hoston (a 8080-at Windowson gyakran lefoglalja a WinNAT).
      - "8090:8080"
    environment:
      PORT: "8080"
      HOST: "0.0.0.0"
      TICK_HZ: "20"
      HOST_IP: "${HOST_IP:-}"
    restart: unless-stopped
    healthcheck:
      # Mirrors the Dockerfile HEALTHCHECK; compose surfaces it in `docker ps`.
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  #  OPT-IN Cloudflare "quick tunnel" — publikus https URL a NEM-LOKÁLIS co-ophoz.
  #  Nem kell fiók/domain: a Cloudflare ad egy random *.trycloudflare.com címet.
  #    Indítás:  docker compose --profile tunnel up -d
  #    URL:      docker compose logs cloudflared    (keresd a https://...trycloudflare.com sort)
  #    Megosztás: küldd el ezt az URL-t — bárki megnyitja, QUICK PLAY / kód, és coopozhattok.
  #  (A net-client https-en automatikusan wss-re vált, a tunnel a WS-t is átviszi.)
  #  Leállítás:  docker compose --profile tunnel down   (vagy stop cloudflared)
  # ---------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mohas-roham-tunnel
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate --url http://mp-server:8080
    depends_on:
      - mp-server
    restart: unless-stopped
