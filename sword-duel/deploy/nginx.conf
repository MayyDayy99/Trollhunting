# ---------------------------------------------------------------------------
# HTTPS (self-signed) — fő belépő. A kamera (getUserMedia) secure contextet
# igényel; a HTTPS ezt BÁRMELY hoston/IP-n teljesíti, ezért LAN/IdeaHub esetén
# ezt használd.
# ---------------------------------------------------------------------------
server {
    listen              443 ssl;
    listen              [::]:443 ssl;
    http2               on;
    server_name         _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:1m;
    ssl_session_timeout 10m;

    root  /usr/share/nginx/html;
    index index.html;

    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json
                    application/wasm image/svg+xml;

    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # A TF.js .wasm backendekhez helyes MIME kell.
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        default_type application/wasm;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

# ---------------------------------------------------------------------------
# Plain HTTP :80 — csak localhost kényelmi fallback.
# http://localhost és http://127.0.0.1 IS secure context, így ugyanazon a gépen
# a kamera működik. LAN IP-n viszont a HTTP NÉMÁN letiltja a kamerát — oda HTTPS.
# (A docker-compose ezt a portot csak 127.0.0.1-re köti.)
# ---------------------------------------------------------------------------
server {
    listen      80;
    listen      [::]:80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json
                    application/wasm image/svg+xml;

    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        default_type application/wasm;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
